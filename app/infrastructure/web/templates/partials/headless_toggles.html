{% if not is_docker %}
<div id="headless-toggles" class="flex items-center space-x-2 mr-4">
    <button hx-post="/api/settings/toggle-headless" hx-vals='{"target": "sync"}' hx-target="#headless-toggles" hx-swap="outerHTML" 
        class="text-xs px-3 py-1.5 rounded-md border font-medium transition-colors {% if headless_mode %}bg-indigo-50 text-indigo-700 border-indigo-200{% else %}bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100{% endif %}">
        <span class="flex items-center">
            <span class="w-1.5 h-1.5 rounded-full mr-1.5 {% if headless_mode %}bg-indigo-500{% else %}bg-slate-400{% endif %}"></span>
            Headless (Sync)
        </span>
    </button>
    <button hx-post="/api/settings/toggle-headless" hx-vals='{"target": "tasks"}' hx-target="#headless-toggles" hx-swap="outerHTML" 
        class="text-xs px-3 py-1.5 rounded-md border font-medium transition-colors {% if headless_mode_tasks %}bg-indigo-50 text-indigo-700 border-indigo-200{% else %}bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100{% endif %}">
        <span class="flex items-center">
            <span class="w-1.5 h-1.5 rounded-full mr-1.5 {% if headless_mode_tasks %}bg-indigo-500{% else %}bg-slate-400{% endif %}"></span>
            Headless (Tarefas)
        </span>
    </button>
</div>
{% endif %}
