<table class="min-w-full divide-y divide-slate-200">
    <thead class="bg-slate-50">
        <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Incorreto</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Correto</th>
            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Ação</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-slate-200">
        {% for mistake, correction in exceptions_typos.items() %}
        <tr>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{{ mistake }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{{ correction }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button hx-delete="/api/config/exceptions/typo/{{ mistake }}" hx-target="#typos-list-container" hx-swap="innerHTML" class="text-rose-500 hover:text-rose-700 transition-colors">Remover</button>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3" class="px-6 py-8 text-center text-sm text-slate-500">Nenhum mapeamento de erro de digitação configurado.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
