{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-10">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 max-w-sm w-full transition-all hover:shadow-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">FioGora</h2>
            <p class="text-sm text-slate-500 mt-1">Insira suas credenciais para acessar</p>
        </div>

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Usuário</label>
                <input type="text" name="username" id="username" required
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="usuário">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="••••••••">
            </div>

            {% if error %}
            <div class="p-3 bg-rose-50 text-rose-500 text-sm rounded-lg flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <button type="submit"
                class="w-full btn-primary flex justify-center items-center py-2.5 px-4 rounded-lg text-sm font-semibold shadow-sm mt-4">
                Entrar
                <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </form>
    </div>
</div>
{% endblock %}
