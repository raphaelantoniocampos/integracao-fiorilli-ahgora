{% extends "base.html" %}

{% block content %}
<div class="mb-8 max-w-xl mx-auto">
    <div class="mb-6">
        <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Mudar Senha</h2>
        <p class="text-slate-500 mt-1">Altere a senha de sua conta.</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
        <form method="POST" action="/change-password" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-500 mb-2">Usuário Atual</label>
                <div class="px-4 py-2 border border-slate-200 rounded-lg bg-slate-50 text-slate-700 cursor-not-allowed">
                    {{ username }}
                </div>
            </div>

            <div>
                <label for="current_password" class="block text-sm font-medium text-slate-700 mb-1">Senha Atual</label>
                <input type="password" name="current_password" id="current_password" required
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            <div>
                <label for="new_password" class="block text-sm font-medium text-slate-700 mb-1">Nova Senha</label>
                <input type="password" name="new_password" id="new_password" required minlength="6"
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>

            {% if error %}
            <div class="p-3 bg-rose-50 text-rose-500 text-sm rounded-lg flex items-center">
                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            {% if success %}
            <div class="p-3 bg-emerald-50 text-emerald-500 text-sm rounded-lg flex items-center">
                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                <span>{{ success }}</span>
            </div>
            {% endif %}

            <div class="flex items-center justify-between pt-4">
                <a href="/" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">Voltar para Dashboard</a>
                <button type="submit"
                    class="btn-primary flex items-center py-2 px-6 rounded-lg text-sm font-semibold shadow-sm">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
